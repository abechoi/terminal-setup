#   🚀  D E E P   S P A C E
#   starfield · nebula glow · cosmic drift
# ═══════════════════════════════════════════════════

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$package\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

[character]
success_symbol = "[✦](bold #EAC253)"
error_symbol = "[✘](bold #ED5959)"
vimcmd_symbol = "[✦](bold #55D384)"

[directory]
style = "bold #4C8BE9"
format = "[ $path]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "📄"
"Downloads" = "📥"
"Projects"  = "🔭"
"Desktop"   = "🖥"

[git_branch]
symbol = "⎇ "
style = "bold #A564DC"
format = "[$symbol$branch]($style) "

[git_status]
style = "#EAC253"
format = '([$all_status$ahead_behind]($style) )'
ahead = "↑${count}"
behind = "↓${count}"
conflicted = "⚡"
deleted = "✕"
modified = "◇"
renamed = "»"
staged = "●"
stashed = "≡"
untracked = "…"

[nodejs]
symbol = " "
style = "#55D384"
format = "[$symbol($version)]($style) "

[python]
symbol = " "
style = "#EAC253"
format = "[$symbol($version)]($style) "

[rust]
symbol = " "
style = "#ED5959"
format = "[$symbol($version)]($style) "

[golang]
symbol = " "
style = "#47B8BE"
format = "[$symbol($version)]($style) "

[docker_context]
symbol = " "
style = "#4C8BE9"
format = "[$symbol$context]($style) "

[package]
symbol = "📦 "
style = "#A564DC"
format = "[$symbol$version]($style) "

[cmd_duration]
min_time = 2_000
style = "#4A566E"
format = "[ $duration]($style)"

[time]
disabled = false
style = "#4A566E"
format = "[ $time]($style)"
time_format = "%H:%M"

[fill]
symbol = " "

[username]
style_user = "#EAC253"
style_root = "bold #ED5959"
format = "[$user]($style) "
show_always = false

[hostname]
style = "#47B8BE"
format = "[@$hostname]($style) "
ssh_only = true
