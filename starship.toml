# Patriot — Starship Prompt Theme
# Clean, modern, informative

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# Prompt character
[character]
success_symbol = "[❯](bold #3182CE)"
error_symbol = "[❯](bold #B31942)"
vimcmd_symbol = "[❮](bold #D69E2E)"

# Directory
[directory]
style = "bold #5B9BD5"
truncation_length = 4
truncation_symbol = "…/"
read_only = " 🔒"
read_only_style = "#B31942"
home_symbol = "~"

[directory.substitutions]
"Documents" = "📄"
"Downloads" = "📥"
"Desktop" = "🖥"
"Projects" = "🔨"

# Git Branch
[git_branch]
symbol = " "
style = "bold #D69E2E"
format = "on [$symbol$branch(:$remote_branch)]($style) "

# Git Status
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "#E2E8F0"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Command Duration
[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "#A0AEC0"
show_milliseconds = false

# Python
[python]
symbol = "🐍 "
format = 'via [$symbol$version(\($virtualenv\))]($style) '
style = "#48BB78"
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile"]

# Node.js
[nodejs]
symbol = "⬢ "
format = 'via [$symbol$version]($style) '
style = "#48BB78"
detect_extensions = ["js", "jsx", "ts", "tsx"]
detect_files = ["package.json"]

# Docker
[docker_context]
symbol = "🐳 "
format = 'via [$symbol$context]($style) '
style = "#3182CE"
only_with_files = true

# Username (only show if SSH or root)
[username]
style_user = "#5B9BD5"
style_root = "bold #B31942"
format = "[$user]($style) "
show_always = false

# Hostname (only show if SSH)
[hostname]
ssh_only = true
format = "at [$hostname]($style) "
style = "#D69E2E"

# Package version
[package]
disabled = true

# AWS (disable to reduce noise)
[aws]
disabled = true

# Google Cloud
[gcloud]
disabled = true
